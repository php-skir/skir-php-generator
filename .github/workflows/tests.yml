name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  tests:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node:
          - "22"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout runtime
        uses: actions/checkout@v4
        with:
          repository: php-skir/runtime
          path: runtime

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Validate package
        run: npm run pack:dry-run

      - name: Run tests
        run: npm test
        env:
          SKIR_RUNTIME_PATH: ${{ github.workspace }}/runtime
